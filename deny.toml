# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Enforced in CI: license policy + RustSec security advisories.

[licenses]
# Every crate in the tree (workspace members + dependencies) must resolve to
# one of these. Our crates are AGPL-3.0-only; the current dependency set is
# permissive (MIT / Apache-2.0 / Unicode-3.0 / Zlib). Add a license here only
# after reviewing it.
allow = [
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[advisories]
# Default RustSec database. Vulnerabilities fail the build; so do yanked crates.
yanked = "deny"

[bans]
# Don't police duplicate versions yet — revisit if the tree bloats.
multiple-versions = "allow"

[sources]
# crates.io only.
unknown-registry = "deny"
unknown-git = "deny"
