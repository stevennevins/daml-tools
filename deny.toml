# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Enforced in CI: license policy + RustSec security advisories.

[licenses]
# Every crate in the tree (workspace members + dependencies) must resolve to
# one of these. Keep this global list for third-party dependency licenses only;
# workspace AGPL licenses are listed as explicit exceptions below.
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[[licenses.exceptions]]
name = "daml-parser"
allow = ["AGPL-3.0-only"]

[[licenses.exceptions]]
name = "daml-lint"
allow = ["AGPL-3.0-only"]

[[licenses.exceptions]]
name = "daml-fmt"
allow = ["AGPL-3.0-only"]

[advisories]
# Default RustSec database. Vulnerabilities fail the build; so do yanked crates.
yanked = "deny"

[bans]
# Don't police duplicate versions yet — revisit if the tree bloats.
multiple-versions = "allow"

[sources]
# crates.io only.
unknown-registry = "deny"
unknown-git = "deny"
