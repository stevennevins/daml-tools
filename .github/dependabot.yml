---
version: 2
updates:
  # GitHub Actions used by the workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions-deps:
        patterns:
          - '*'
    commit-message:
      prefix: 'chore(deps): '

  # Cargo dependencies for the whole workspace.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: 'chore(deps): '
    labels:
      - dependabot
      - dependencies
    open-pull-requests-limit: 5
