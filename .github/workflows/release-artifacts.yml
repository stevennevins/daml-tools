name: Release Artifacts

on:
  push:
    tags:
      - "daml-lint-v*"
      - "daml-fmt-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach assets to"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-cli-archive:
    name: build CLI archive (${{ matrix.target }})
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^daml-(lint|fmt)-v ]]; then
            echo "::error::release artifacts require a daml-lint-v* or daml-fmt-v* tag, got ${RELEASE_TAG}"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLIs
        run: cargo build --release --locked --target ${{ matrix.target }} --bin daml-lint --bin daml-fmt
      - name: Check Linux glibc baseline
        if: ${{ startsWith(matrix.target, 'x86_64-unknown-linux-gnu') || startsWith(matrix.target, 'aarch64-unknown-linux-gnu') }}
        shell: bash
        run: |
          set -euo pipefail
          release_dir="target/${{ matrix.target }}/release"
          for tool in daml-lint daml-fmt; do
            binary="${release_dir}/${tool}"
            max_glibc="$(objdump -T "${binary}" | sed -nE 's/.*GLIBC_([0-9]+\.[0-9]+).*/\1/p' | sort -Vu | tail -n1)"
            if [[ -z "${max_glibc}" ]]; then
              echo "::error::Could not determine the maximum GLIBC symbol version used by ${binary}."
              exit 1
            fi
            echo "${binary} requires GLIBC_${max_glibc} or older."
            if [[ "$(printf '%s\n' "${max_glibc}" "2.35" | sort -Vu | tail -n1)" != "2.35" ]]; then
              echo "::error::${binary} requires GLIBC_${max_glibc}; Linux release archives must not require newer than GLIBC_2.35."
              exit 1
            fi
          done
      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          target="${{ matrix.target }}"
          release_dir="target/${target}/release"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            archive="daml-tools-${target}.zip"
            7z a "dist/${archive}" \
              "${release_dir}/daml-lint.exe" \
              "${release_dir}/daml-fmt.exe"
          else
            archive="daml-tools-${target}.tar.gz"
            tar -czf "dist/${archive}" -C "${release_dir}" daml-lint daml-fmt
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${archive}" > "${archive}.sha256")
          else
            (cd dist && shasum -a 256 "${archive}" > "${archive}.sha256")
          fi
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${TAG}" >/dev/null 2>&1 || \
            gh release create "${TAG}" --verify-tag --title "${TAG}" --notes "CLI artifacts for ${TAG}."
          gh release upload "${TAG}" dist/* --clobber
