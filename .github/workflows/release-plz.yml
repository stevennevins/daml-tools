name: Release-plz

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'stevennevins' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check release-plz token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${RELEASE_PLZ_TOKEN}" ]]; then
            echo "::error::Set RELEASE_PLZ_TOKEN so release-plz-created tags and pull requests trigger follow-up workflows."
            exit 1
          fi
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    needs: release-plz-release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'stevennevins' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check release-plz token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${RELEASE_PLZ_TOKEN}" ]]; then
            echo "::error::Set RELEASE_PLZ_TOKEN so release-plz-created tags and pull requests trigger follow-up workflows."
            exit 1
          fi
      - name: Run release-plz release-pr
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Sync npm package versions
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_PR: ${{ steps.release-plz.outputs.pr }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_PR}" || "${RELEASE_PR}" == "null" ]]; then
            echo "Release-plz did not open or update a release PR."
            exit 0
          fi

          sync_tools=()

          if jq -e '.releases[]? | select(.package_name == "daml-lint")' <<<"${RELEASE_PR}" >/dev/null; then
            sync_tools+=("daml-lint")
          fi

          if jq -e '.releases[]? | select(.package_name == "daml-fmt")' <<<"${RELEASE_PR}" >/dev/null; then
            sync_tools+=("daml-fmt")
          fi

          if [[ "${#sync_tools[@]}" -eq 0 ]]; then
            echo "Release PR does not include daml-lint or daml-fmt; skipping npm package version sync."
            exit 0
          fi

          pr_number=$(jq -r '.number' <<<"${RELEASE_PR}")
          head_branch=$(jq -r '.head_branch' <<<"${RELEASE_PR}")

          if [[ -z "${pr_number}" || "${pr_number}" == "null" || -z "${head_branch}" || "${head_branch}" == "null" ]]; then
            echo "::error::Release-plz output did not include a usable PR number and head branch."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh pr checkout "${pr_number}"

          for tool in "${sync_tools[@]}"; do
            if [[ "${tool}" == "daml-lint" ]]; then
              (
                cd crates/daml-lint
                node tools/sync-lint-plugin-version.mjs
              )
            fi
          done

          node tools/sync-npm-cli-versions.mjs "${sync_tools[@]}"

          if git diff --quiet -- \
            crates/daml-lint/package.json \
            crates/daml-lint/package-lock.json \
            crates/daml-lint/lint-plugin/package.json \
            crates/daml-lint/lint-plugin/templates/project/package.json \
            crates/daml-lint/npm \
            crates/daml-fmt/package.json \
            crates/daml-fmt/npm; then
            echo "npm package metadata is already synced."
            exit 0
          fi

          git add \
            crates/daml-lint/package.json \
            crates/daml-lint/package-lock.json \
            crates/daml-lint/lint-plugin/package.json \
            crates/daml-lint/lint-plugin/templates/project/package.json \
            crates/daml-lint/npm \
            crates/daml-fmt/package.json \
            crates/daml-fmt/npm
          git commit -m "chore: sync npm package versions"
          git remote set-url origin "https://x-access-token:${RELEASE_PLZ_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${head_branch}"
