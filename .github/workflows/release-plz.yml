name: Release-plz

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

jobs:
  release-gate-ci:
    name: Release gate / CI
    if: ${{ github.repository_owner == 'stevennevins' }}
    uses: ./.github/workflows/ci.yml
    with:
      run-release-builds: true
    permissions:
      contents: read

  release-gate-docs:
    name: Release gate / Docs
    if: ${{ github.repository_owner == 'stevennevins' }}
    uses: ./.github/workflows/docs.yml
    permissions:
      contents: read
      pages: write
      id-token: write

  release-plz-release:
    name: Release-plz release
    needs: [release-gate-ci, release-gate-docs]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.repository_owner == 'stevennevins' }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check release-plz token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${RELEASE_PLZ_TOKEN}" ]]; then
            echo "::error::Set RELEASE_PLZ_TOKEN so release-plz-created tags and pull requests trigger follow-up workflows."
            exit 1
          fi
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    needs: release-plz-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.repository_owner == 'stevennevins' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check release-plz token
        env:
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${RELEASE_PLZ_TOKEN}" ]]; then
            echo "::error::Set RELEASE_PLZ_TOKEN so release-plz-created tags and pull requests trigger follow-up workflows."
            exit 1
          fi
      - name: Run release-plz release-pr
        id: release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Sync lint-plugin package version
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_PLZ_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_PR: ${{ steps.release-plz.outputs.pr }}
        shell: bash
        run: |
          set -euo pipefail

          # Only @daml-tools/lint-plugin tracks the daml-lint crate version in
          # committed package.json files. The CLI npm packages (daml-lint /
          # daml-fmt) are generated by cargo-npm from Cargo.toml at publish time,
          # so they need no version sync here.
          if [[ -z "${RELEASE_PR}" || "${RELEASE_PR}" == "null" ]]; then
            echo "Release-plz did not open or update a release PR."
            exit 0
          fi

          if ! jq -e 'has("number") and .number != null and has("head_branch") and .head_branch != null' <<<"${RELEASE_PR}" >/dev/null; then
            if jq -e '((.releases? // []) | length) == 0' <<<"${RELEASE_PR}" >/dev/null; then
              echo "Release-plz did not open or update a release PR requiring metadata sync."
              exit 0
            fi

            echo "::error::Release-plz output did not include a usable PR number and head branch."
            exit 1
          fi

          pr_number=$(jq -r '.number' <<<"${RELEASE_PR}")
          head_branch=$(jq -r '.head_branch' <<<"${RELEASE_PR}")

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh pr checkout "${pr_number}"

          # release-plz can update an existing release PR after newer main
          # commits have also changed release metadata. In that case it may
          # leave committed conflict markers in Cargo.toml/Cargo.lock; if we
          # run the lint-plugin sync script before cleaning them, `cargo
          # metadata` fails on the marker text instead of the workflow repairing
          # the release PR. For release-managed metadata files, keep the
          # "Stashed changes" side because that is the release-plz-generated
          # version bump/changelog update.
          python3 - <<'PY'
          from pathlib import Path

          release_managed_files = [
              Path("Cargo.toml"),
              Path("Cargo.lock"),
              *Path("crates").glob("*/Cargo.toml"),
              *Path("crates").glob("*/CHANGELOG.md"),
          ]

          def keep_stashed_changes(path: Path) -> bool:
              text = path.read_text()
              if "<<<<<<< Updated upstream" not in text:
                  return False

              resolved = []
              state = "normal"
              changed = False
              for line in text.splitlines(keepends=True):
                  if state == "normal" and line.startswith("<<<<<<< Updated upstream"):
                      state = "updated"
                      changed = True
                      continue
                  if state == "updated" and line.startswith("======="):
                      state = "stashed"
                      continue
                  if state == "stashed" and line.startswith(">>>>>>> Stashed changes"):
                      state = "normal"
                      continue
                  if state in {"normal", "stashed"}:
                      resolved.append(line)

              if state != "normal":
                  raise SystemExit(f"unterminated conflict marker block in {path}")

              path.write_text("".join(resolved))
              return changed

          fixed = [str(path) for path in release_managed_files if path.exists() and keep_stashed_changes(path)]
          if fixed:
              print("Resolved release-plz metadata conflict markers in:")
              for path in fixed:
                  print(f"  {path}")
          else:
              print("No release-plz metadata conflict markers found.")
          PY

          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' Cargo.toml Cargo.lock crates; then
            echo "::error::Release PR still contains conflict markers after release metadata auto-resolution."
            exit 1
          fi

          if jq -e '.releases[]? | select(.package_name == "daml-lint")' <<<"${RELEASE_PR}" >/dev/null; then
            ( cd crates/daml-lint && node tools/sync-lint-plugin-version.mjs )
          else
            echo "Release PR does not include daml-lint; skipping lint-plugin package metadata sync."
          fi

          if git diff --quiet -- \
            Cargo.toml \
            Cargo.lock \
            crates/*/Cargo.toml \
            crates/*/CHANGELOG.md \
            crates/daml-lint/package.json \
            crates/daml-lint/package-lock.json \
            crates/daml-lint/lint-plugin/package.json \
            crates/daml-lint/lint-plugin/templates/project/package.json; then
            echo "Release metadata and lint-plugin package metadata are already synced."
            exit 0
          fi

          git add \
            Cargo.toml \
            Cargo.lock \
            crates/*/Cargo.toml \
            crates/*/CHANGELOG.md \
            crates/daml-lint/package.json \
            crates/daml-lint/package-lock.json \
            crates/daml-lint/lint-plugin/package.json \
            crates/daml-lint/lint-plugin/templates/project/package.json
          git commit -m "chore: sync release metadata"
          git remote set-url origin "https://x-access-token:${RELEASE_PLZ_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${head_branch}"
