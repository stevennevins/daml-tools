name: Publish npm Packages

on:
  push:
    tags:
      - "daml-lint-v*"
      - "daml-fmt-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "daml-lint or daml-fmt release tag to publish"
        required: true
      use_npm_token:
        description: "Use the temporary NPM_TOKEN bootstrap secret instead of trusted publishing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  # Pinned cargo-npm (CLI npm packaging). Keep in sync with
  # .github/workflows/ci.yml and CONTRIBUTING.md.
  CARGO_NPM_VERSION: "0.1.2"

jobs:
  # Build the released CLI's native binary on each platform's own runner. The
  # binaries become workflow artifacts the publish job assembles into npm
  # packages with cargo-npm.
  build-cli:
    name: build ${{ matrix.platform }} CLI binary
    runs-on: ${{ matrix.os }}
    if: ${{ github.repository_owner == 'stevennevins' && (startsWith(github.event.inputs.tag || github.ref_name, 'daml-lint-v') || startsWith(github.event.inputs.tag || github.ref_name, 'daml-fmt-v')) }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu, platform: linux-x64, binary_suffix: "" }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, platform: linux-arm64, binary_suffix: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, platform: darwin-arm64, binary_suffix: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, platform: win32-x64, binary_suffix: ".exe" }
    steps:
      - name: Resolve release package
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG}" =~ ^(daml-lint|daml-fmt)-v(.+)$ ]]; then
            tool="${BASH_REMATCH[1]}"
            version="${BASH_REMATCH[2]}"
            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::npm CLI publishing requires a semver release tag, got ${RELEASE_TAG}"
              exit 1
            fi
            echo "tool=${tool}" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::npm CLI publishing requires a daml-lint-v* or daml-fmt-v* tag, got ${RELEASE_TAG}"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI
        run: cargo build --release --locked --target ${{ matrix.target }} --bin ${{ steps.release.outputs.tool }}
      - name: Check Linux glibc baseline
        if: ${{ startsWith(matrix.platform, 'linux-') }}
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ steps.release.outputs.tool }}${{ matrix.binary_suffix }}"
          max_glibc="$(objdump -T "${binary}" | sed -nE 's/.*GLIBC_([0-9]+\.[0-9]+).*/\1/p' | sort -Vu | tail -n1)"
          if [[ -z "${max_glibc}" ]]; then
            echo "::error::Could not determine the maximum GLIBC symbol version used by ${binary}."
            exit 1
          fi
          echo "${binary} requires GLIBC_${max_glibc} or older."
          if [[ "$(printf '%s\n' "${max_glibc}" "2.35" | sort -Vu | tail -n1)" != "2.35" ]]; then
            echo "::error::${binary} requires GLIBC_${max_glibc}; npm Linux packages must not require newer than GLIBC_2.35."
            exit 1
          fi
      - name: Upload CLI binary
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ steps.release.outputs.tool }}${{ matrix.binary_suffix }}
          if-no-files-found: error

  # Assemble and publish the npm packages with cargo-npm: it reads
  # [package.metadata.npm] in the crate, builds one wrapper package plus one
  # per-platform package from the binaries, and publishes platform packages
  # first then the wrapper. The package version comes from Cargo.toml, so there
  # is no version metadata to keep in sync.
  publish-cli:
    name: publish npm packages
    runs-on: ubuntu-latest
    needs: build-cli
    if: ${{ github.repository_owner == 'stevennevins' && (startsWith(github.event.inputs.tag || github.ref_name, 'daml-lint-v') || startsWith(github.event.inputs.tag || github.ref_name, 'daml-fmt-v')) }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Resolve release package
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG}" =~ ^(daml-lint|daml-fmt)-v(.+)$ ]]; then
            tool="${BASH_REMATCH[1]}"
            version="${BASH_REMATCH[2]}"
            if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::npm CLI publishing requires a semver release tag, got ${RELEASE_TAG}"
              exit 1
            fi
            echo "tool=${tool}" >> "${GITHUB_OUTPUT}"
            echo "version=${version}" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::npm CLI publishing requires a daml-lint-v* or daml-fmt-v* tag, got ${RELEASE_TAG}"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install npm 11
        run: npm install --global npm@^11.10.0
      - name: Install cargo-npm
        run: cargo install cargo-npm --version "${CARGO_NPM_VERSION}" --locked
      - name: Resolve npm package and registry state
        id: npm
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
          TOOL: ${{ steps.release.outputs.tool }}
        run: |
          set -euo pipefail
          crate_version="$(cargo metadata --format-version=1 --no-deps | jq -r --arg tool "${TOOL}" '.packages[] | select(.name == $tool) | .version')"
          if [[ "${crate_version}" != "${EXPECTED_VERSION}" ]]; then
            echo "::error::crates/${TOOL}/Cargo.toml version ${crate_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
          name="@daml-tools/${TOOL}"
          dist_tag="latest"
          if [[ "${EXPECTED_VERSION}" == *-* ]]; then
            dist_tag="next"
          fi
          latest_version="$(npm view "${name}@latest" version --prefer-online 2>/dev/null || true)"
          {
            echo "name=${name}"
            echo "dist_tag=${dist_tag}"
            echo "latest_version=${latest_version}"
          } >> "${GITHUB_OUTPUT}"
          if npm view "${name}@${EXPECTED_VERSION}" version --prefer-online >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${name}@${EXPECTED_VERSION} already exists; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Download CLI binaries
        if: ${{ steps.npm.outputs.exists != 'true' }}
        uses: actions/download-artifact@v7
        with:
          pattern: cli-*
          path: artifacts
      - name: Stage binaries into target/<triple>/release
        if: ${{ steps.npm.outputs.exists != 'true' }}
        shell: bash
        env:
          TOOL: ${{ steps.release.outputs.tool }}
        run: |
          set -euo pipefail
          for triple in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu aarch64-apple-darwin x86_64-pc-windows-msvc; do
            suffix=""
            [[ "${triple}" == *windows* ]] && suffix=".exe"
            dest="target/${triple}/release"
            mkdir -p "${dest}"
            cp "artifacts/cli-${triple}/${TOOL}${suffix}" "${dest}/${TOOL}${suffix}"
            # Artifacts do not preserve the Unix exec bit; restore it so the
            # generated platform package ships an executable binary.
            [[ "${triple}" == *windows* ]] || chmod +x "${dest}/${TOOL}${suffix}"
          done
      - name: Generate npm packages
        if: ${{ steps.npm.outputs.exists != 'true' }}
        run: cargo npm generate -p ${{ steps.release.outputs.tool }} --out-dir target/npm-dist --clean
      - name: Validate generated npm packages
        if: ${{ steps.npm.outputs.exists != 'true' }}
        shell: bash
        env:
          TOOL: ${{ steps.release.outputs.tool }}
          PACKAGE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          wrapper="target/npm-dist/@daml-tools/${TOOL}/package.json"
          node -e "const p=require('./'+process.argv[1]); const v=process.argv[2]; const deps=p.optionalDependencies||{}; if(!p.bin||Object.keys(deps).length!==4)throw new Error('wrapper missing bin or four optionalDependencies'); for (const dep of Object.values(deps)) if(dep!==v) throw new Error('optional dependency version mismatch')" "${wrapper}" "${PACKAGE_VERSION}"
          for package_dir in target/npm-dist/@daml-tools/"${TOOL}"-*; do
            test -f "${package_dir}/${TOOL}" || test -f "${package_dir}/${TOOL}.exe"
          done
      - name: Publish npm packages
        if: ${{ steps.npm.outputs.exists != 'true' }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          USE_NPM_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.use_npm_token }}
          DIST_TAG: ${{ steps.npm.outputs.dist_tag }}
          TOOL: ${{ steps.release.outputs.tool }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${USE_NPM_TOKEN}" == "true" ]]; then
            if [[ -z "${NPM_TOKEN:-}" ]]; then
              echo "::error::use_npm_token was true, but the NPM_TOKEN secret is not configured."
              exit 1
            fi
            npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          elif [[ -n "${NPM_TOKEN:-}" ]]; then
            echo "::notice::NPM_TOKEN is configured but ignored. Dispatch manually with use_npm_token=true only for bootstrap publishing."
          fi
          if [[ "${DIST_TAG}" != "latest" ]]; then
            echo "::notice::Publishing under the '${DIST_TAG}' dist-tag; 'latest' is left unchanged."
          fi

          wait_for_package() {
            local package_spec="$1"
            echo "Waiting for ${package_spec} to be visible in the npm registry..."
            for attempt in {1..30}; do
              if npm view "${package_spec}" version --prefer-online >/dev/null 2>&1; then
                return
              fi
              if [[ "${attempt}" -eq 30 ]]; then
                echo "::error::${package_spec} did not appear on the npm registry."
                exit 1
              fi
              sleep 10
            done
          }

          publish_if_missing() {
            local package_dir="$1"
            local package_name package_version
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            package_version="$(node -p "require('./${package_dir}/package.json').version")"
            if npm view "${package_name}@${package_version}" version --prefer-online >/dev/null 2>&1; then
              echo "${package_name}@${package_version} already exists; skipping publish."
              wait_for_package "${package_name}@${package_version}"
              return
            fi
            npm publish "${package_dir}" --access public --tag "${DIST_TAG}"
            wait_for_package "${package_name}@${package_version}"
          }

          for package_dir in target/npm-dist/@daml-tools/"${TOOL}"-*; do
            publish_if_missing "${package_dir}"
          done
          publish_if_missing "target/npm-dist/@daml-tools/${TOOL}"
      - name: Smoke published wrapper as a dev dependency
        shell: bash
        env:
          PACKAGE_NAME: ${{ steps.npm.outputs.name }}
          PACKAGE_VERSION: ${{ steps.release.outputs.version }}
          DIST_TAG: ${{ steps.npm.outputs.dist_tag }}
          PREVIOUS_LATEST: ${{ steps.npm.outputs.latest_version }}
          TOOL: ${{ steps.release.outputs.tool }}
        run: |
          set -euo pipefail
          echo "Waiting for ${PACKAGE_NAME}@${PACKAGE_VERSION} to be visible in the npm registry..."
          for attempt in {1..30}; do
            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --prefer-online >/dev/null 2>&1; then
              break
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} did not appear on the npm registry."
              exit 1
            fi
            sleep 10
          done
          work="$(mktemp -d)"
          cd "${work}"
          npm init -y >/dev/null
          npm install --save-dev "${PACKAGE_NAME}@${PACKAGE_VERSION}"
          test -x "node_modules/.bin/${TOOL}"
          npx --no-install "${TOOL}" --version
          if [[ "${DIST_TAG}" != "latest" ]]; then
            next_version="$(npm view "${PACKAGE_NAME}@${DIST_TAG}" version --prefer-online)"
            if [[ "${next_version}" != "${PACKAGE_VERSION}" ]]; then
              echo "::error::${PACKAGE_NAME}@${DIST_TAG} is ${next_version}, expected ${PACKAGE_VERSION}."
              exit 1
            fi
            latest_version="$(npm view "${PACKAGE_NAME}@latest" version --prefer-online)"
            if [[ "${latest_version}" != "${PREVIOUS_LATEST}" ]]; then
              echo "::error::${PACKAGE_NAME}@latest moved from ${PREVIOUS_LATEST} to ${latest_version} during prerelease publish."
              exit 1
            fi
            echo "${PACKAGE_NAME}@${DIST_TAG} resolves to ${PACKAGE_VERSION}; latest remains ${latest_version}."
          fi
      - name: Check generated rules and plugin package
        if: ${{ steps.release.outputs.tool == 'daml-lint' }}
        working-directory: crates/daml-lint
        run: npm ci && npm run check:rules
      - name: Check lint-plugin package version and registry state
        if: ${{ steps.release.outputs.tool == 'daml-lint' }}
        id: lint_plugin_npm
        working-directory: crates/daml-lint/lint-plugin
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          rules_package_version="$(node -p "require('../package.json').version")"
          lockfile_version="$(node -p "require('../package-lock.json').version")"
          lockfile_root_version="$(node -p "require('../package-lock.json').packages[''].version")"
          if [[ "${package_version}" != "${EXPECTED_VERSION}" ]]; then
            echo "::error::package.json version ${package_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
          if [[ "${rules_package_version}" != "${EXPECTED_VERSION}" ]]; then
            echo "::error::daml-lint-rules package.json version ${rules_package_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
          if [[ "${lockfile_version}" != "${EXPECTED_VERSION}" || "${lockfile_root_version}" != "${EXPECTED_VERSION}" ]]; then
            echo "::error::package-lock.json versions ${lockfile_version}/${lockfile_root_version} do not match ${RELEASE_TAG}"
            exit 1
          fi
          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          if npm view "${package_name}@${package_version}" version --prefer-online >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${package_name}@${package_version} already exists; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Smoke starter template
        if: ${{ steps.release.outputs.tool == 'daml-lint' && steps.lint_plugin_npm.outputs.exists != 'true' }}
        working-directory: crates/daml-lint
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.lint_plugin_npm.outputs.version }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          pack_dir="${work}/pack"
          project_dir="${work}/project"
          mkdir -p "${pack_dir}" "${project_dir}"
          npm pack ./lint-plugin --json --pack-destination "${pack_dir}" > "${work}/pack.json"
          tarball="$(node -e 'const fs = require("node:fs"); const [pack] = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); console.log(pack.filename);' "${work}/pack.json")"
          cp -R lint-plugin/templates/project/. "${project_dir}/"
          cd "${project_dir}"
          npm install --save-dev "${pack_dir}/${tarball}" "@daml-tools/daml-lint@${PACKAGE_VERSION}" typescript@6.0.3 esbuild@0.28.1
          npm run check
          npm run build
          set +e
          npm run lint:missing > "${work}/missing.out" 2>&1
          missing_status=$?
          set -e
          if [[ "${missing_status}" -ne 1 ]]; then
            cat "${work}/missing.out"
            echo "::error::lint:missing should report the starter template finding and exit 1."
            exit 1
          fi
          grep -F "template-requires-ensure/template-requires-ensure" "${work}/missing.out"
          npm run lint:clean
      - name: Publish lint-plugin package
        if: ${{ steps.release.outputs.tool == 'daml-lint' && steps.lint_plugin_npm.outputs.exists != 'true' }}
        working-directory: crates/daml-lint/lint-plugin
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          USE_NPM_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.use_npm_token }}
          PACKAGE_VERSION: ${{ steps.lint_plugin_npm.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${USE_NPM_TOKEN}" == "true" ]]; then
            if [[ -z "${NPM_TOKEN:-}" ]]; then
              echo "::error::use_npm_token was true, but the NPM_TOKEN secret is not configured."
              exit 1
            fi
            npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          elif [[ -n "${NPM_TOKEN:-}" ]]; then
            echo "::notice::NPM_TOKEN is configured but ignored. Dispatch manually with use_npm_token=true only for bootstrap publishing."
          fi
          publish_args=(--access public)
          if [[ "${PACKAGE_VERSION}" == *-* ]]; then
            publish_args+=(--tag next)
            echo "::notice::Publishing prerelease ${PACKAGE_VERSION} under the 'next' dist-tag."
          fi
          npm publish "${publish_args[@]}"
