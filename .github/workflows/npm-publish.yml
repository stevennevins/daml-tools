name: Publish npm Package

on:
  push:
    tags:
      - "daml-lint-v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-lint-plugin:
    name: publish @daml-tools/lint-plugin
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'stevennevins' }}
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install npm 11
        run: npm install --global npm@^11.10.0
      - name: Check generated rules and plugin package
        working-directory: crates/daml-lint
        run: npm ci && npm run check:rules
      - name: Check package version matches release tag
        if: ${{ startsWith(github.ref, 'refs/tags/daml-lint-v') }}
        working-directory: crates/daml-lint/lint-plugin
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#daml-lint-v}"
          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "::error::package.json version ${package_version} does not match ${GITHUB_REF_NAME}"
            exit 1
          fi
      - name: Publish package with trusted publishing
        if: ${{ env.HAS_NPM_TOKEN != 'true' }}
        working-directory: crates/daml-lint/lint-plugin
        run: npm publish --access public --provenance
      - name: Publish package with NPM_TOKEN
        if: ${{ env.HAS_NPM_TOKEN == 'true' }}
        working-directory: crates/daml-lint/lint-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
