name: Publish npm Packages

on:
  push:
    tags:
      - "daml-lint-v*"
      - "daml-fmt-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "daml-lint or daml-fmt release tag to publish"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-lint-plugin:
    name: publish @daml-tools/lint-plugin
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'stevennevins' && startsWith(github.event.inputs.tag || github.ref_name, 'daml-lint-v') }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Check release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^daml-lint-v ]]; then
            echo "::error::npm publishing requires a daml-lint-v* release tag, got ${RELEASE_TAG}"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install npm 11
        run: npm install --global npm@^11.10.0
      - name: Check generated rules and plugin package
        working-directory: crates/daml-lint
        run: npm ci && npm run check:rules
      - name: Check package version and registry state
        id: npm-package
        working-directory: crates/daml-lint/lint-plugin
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          rules_package_version="$(node -p "require('../package.json').version")"
          lockfile_version="$(node -p "require('../package-lock.json').version")"
          lockfile_root_version="$(node -p "require('../package-lock.json').packages[''].version")"
          tag_version="${RELEASE_TAG#daml-lint-v}"
          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "::error::package.json version ${package_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
          if [[ "${rules_package_version}" != "${tag_version}" ]]; then
            echo "::error::daml-lint-rules package.json version ${rules_package_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
          if [[ "${lockfile_version}" != "${tag_version}" || "${lockfile_root_version}" != "${tag_version}" ]]; then
            echo "::error::package-lock.json versions ${lockfile_version}/${lockfile_root_version} do not match ${RELEASE_TAG}"
            exit 1
          fi
          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          if npm view "${package_name}@${package_version}" version --prefer-online >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${package_name}@${package_version} already exists; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Publish package
        if: ${{ steps.npm-package.outputs.exists != 'true' }}
        working-directory: crates/daml-lint/lint-plugin
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NPM_TOKEN:-}" ]]; then
            npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          fi
          npm publish --access public

  publish-cli-platform:
    name: publish ${{ matrix.platform }} CLI package
    runs-on: ${{ matrix.os }}
    if: ${{ github.repository_owner == 'stevennevins' && (startsWith(github.event.inputs.tag || github.ref_name, 'daml-lint-v') || startsWith(github.event.inputs.tag || github.ref_name, 'daml-fmt-v')) }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, platform: linux-x64, binary_suffix: "" }
          - { os: macos-latest, target: aarch64-apple-darwin, platform: darwin-arm64, binary_suffix: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, platform: win32-x64, binary_suffix: ".exe" }
    steps:
      - name: Resolve release package
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG}" =~ ^(daml-lint|daml-fmt)-v(.+)$ ]]; then
            echo "tool=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
            echo "version=${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::npm CLI publishing requires a daml-lint-v* or daml-fmt-v* tag, got ${RELEASE_TAG}"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install npm 11
        run: npm install --global npm@^11.10.0
      - name: Check npm CLI package metadata
        run: node tools/sync-npm-cli-versions.mjs --check ${{ steps.release.outputs.tool }}
      - name: Check package version and registry state
        id: npm-package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="crates/${{ steps.release.outputs.tool }}/npm/${{ matrix.platform }}"
          package_name="$(node -p "require('./${package_dir}/package.json').name")"
          package_version="$(node -p "require('./${package_dir}/package.json').version")"
          if [[ "${package_version}" != "${{ steps.release.outputs.version }}" ]]; then
            echo "::error::${package_dir} version ${package_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          if npm view "${package_name}@${package_version}" version --prefer-online >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${package_name}@${package_version} already exists; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Verify existing platform package registry metadata
        if: ${{ steps.npm-package.outputs.exists == 'true' }}
        run: node tools/verify-npm-cli-registry-package.mjs crates/${{ steps.release.outputs.tool }}/npm/${{ matrix.platform }}
      - name: Build CLI
        if: ${{ steps.npm-package.outputs.exists != 'true' }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin ${{ steps.release.outputs.tool }}
      - name: Prepare platform package
        if: ${{ steps.npm-package.outputs.exists != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          tool="${{ steps.release.outputs.tool }}"
          package_dir="crates/${tool}/npm/${{ matrix.platform }}"
          binary="target/${{ matrix.target }}/release/${tool}${{ matrix.binary_suffix }}"
          mkdir -p "${package_dir}/bin"
          cp "${binary}" "${package_dir}/bin/${tool}${{ matrix.binary_suffix }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "${package_dir}/bin/${tool}${{ matrix.binary_suffix }}"
          fi
      - name: Publish platform package
        if: ${{ steps.npm-package.outputs.exists != 'true' }}
        working-directory: crates/${{ steps.release.outputs.tool }}/npm/${{ matrix.platform }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NPM_TOKEN:-}" ]]; then
            npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          fi
          npm publish --access public

  publish-cli-wrapper:
    name: publish CLI wrapper package
    runs-on: ubuntu-latest
    needs: publish-cli-platform
    if: ${{ github.repository_owner == 'stevennevins' && (startsWith(github.event.inputs.tag || github.ref_name, 'daml-lint-v') || startsWith(github.event.inputs.tag || github.ref_name, 'daml-fmt-v')) }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Resolve release package
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RELEASE_TAG}" =~ ^(daml-lint|daml-fmt)-v(.+)$ ]]; then
            echo "tool=${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"
            echo "version=${BASH_REMATCH[2]}" >> "${GITHUB_OUTPUT}"
          else
            echo "::error::npm CLI publishing requires a daml-lint-v* or daml-fmt-v* tag, got ${RELEASE_TAG}"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install npm 11
        run: npm install --global npm@^11.10.0
      - name: Check npm CLI package metadata
        run: |
          node tools/sync-npm-cli-versions.mjs --check ${{ steps.release.outputs.tool }}
          node tools/check-npm-cli-packages.mjs
      - name: Check package version and registry state
        id: npm-package
        shell: bash
        run: |
          set -euo pipefail
          package_dir="crates/${{ steps.release.outputs.tool }}/npm/cli"
          package_name="$(node -p "require('./${package_dir}/package.json').name")"
          package_version="$(node -p "require('./${package_dir}/package.json').version")"
          if [[ "${package_version}" != "${{ steps.release.outputs.version }}" ]]; then
            echo "::error::${package_dir} version ${package_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
          echo "name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${package_version}" >> "${GITHUB_OUTPUT}"
          if npm view "${package_name}@${package_version}" version --prefer-online >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${package_name}@${package_version} already exists; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Verify existing wrapper package registry metadata
        if: ${{ steps.npm-package.outputs.exists == 'true' }}
        run: node tools/verify-npm-cli-registry-package.mjs crates/${{ steps.release.outputs.tool }}/npm/cli
      - name: Wait for platform package registry metadata
        if: ${{ steps.npm-package.outputs.exists != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          for platform in darwin-arm64 linux-x64 win32-x64; do
            package_dir="crates/${{ steps.release.outputs.tool }}/npm/${platform}"
            echo "Waiting for ${package_dir} to be visible in the npm registry..."
            for attempt in {1..30}; do
              if node tools/verify-npm-cli-registry-package.mjs "${package_dir}"; then
                break
              fi
              if [[ "${attempt}" -eq 30 ]]; then
                echo "::error::${package_dir} did not match npm registry metadata after ${attempt} attempts."
                exit 1
              fi
              sleep 10
            done
          done
      - name: Publish wrapper package
        if: ${{ steps.npm-package.outputs.exists != 'true' }}
        working-directory: crates/${{ steps.release.outputs.tool }}/npm/cli
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${NPM_TOKEN:-}" ]]; then
            npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          fi
          npm publish --access public
      - name: Wait for wrapper package registry metadata
        shell: bash
        run: |
          set -euo pipefail
          package_dir="crates/${{ steps.release.outputs.tool }}/npm/cli"
          echo "Waiting for ${package_dir} to be visible in the npm registry..."
          for attempt in {1..30}; do
            if node tools/verify-npm-cli-registry-package.mjs "${package_dir}"; then
              exit 0
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "::error::${package_dir} did not match npm registry metadata after ${attempt} attempts."
              exit 1
            fi
            sleep 10
          done
      - name: Smoke published wrapper package
        shell: bash
        run: |
          set -euo pipefail
          package_name="${{ steps.npm-package.outputs.name }}"
          package_version="${{ steps.npm-package.outputs.version }}"
          tool="${{ steps.release.outputs.tool }}"
          work="$(mktemp -d)"
          cd "${work}"
          npm init -y
          npm install --save-dev "${package_name}@${package_version}"
          test -x "node_modules/.bin/${tool}"
          npx --no-install "${tool}" --version
