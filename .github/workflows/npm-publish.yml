name: Publish npm Package

on:
  push:
    tags:
      - "daml-lint-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "daml-lint release tag to publish"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish-lint-plugin:
    name: publish @daml-tools/lint-plugin
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'stevennevins' }}
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Check release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${RELEASE_TAG}" =~ ^daml-lint-v ]]; then
            echo "::error::npm publishing requires a daml-lint-v* release tag, got ${RELEASE_TAG}"
            exit 1
          fi
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Install npm 11
        run: npm install --global npm@^11.10.0
      - name: Check generated rules and plugin package
        working-directory: crates/daml-lint
        run: npm ci && npm run check:rules
      - name: Check package version matches release tag
        working-directory: crates/daml-lint/lint-plugin
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#daml-lint-v}"
          if [[ "${package_version}" != "${tag_version}" ]]; then
            echo "::error::package.json version ${package_version} does not match ${RELEASE_TAG}"
            exit 1
          fi
      - name: Publish package
        working-directory: crates/daml-lint/lint-plugin
        run: npm publish --access public --provenance
