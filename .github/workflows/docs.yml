name: Docs

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  MISE_LOCKED: "1"

permissions:
  contents: read

jobs:
  docs:
    name: Docs signoff / version and link checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4.2.0
        with:
          # Pin the mise binary so CI matches the mise version that wrote
          # mise.lock (avoids MISE_LOCKED resolution skew across mise releases).
          version: 2026.6.14
          install: false
      - name: Install docs tools from mise lockfile
        run: mise install rust node github:lycheeverse/lychee
      - name: Check docs version metadata
        shell: bash
        run: |
          set -euo pipefail

          fail() {
            echo "$1" >&2
            exit 1
          }

          crate_version() {
            local package="$1"
            cargo metadata --no-deps --format-version=1 --locked \
              | jq -r --arg package "${package}" '.packages[] | select(.name == $package) | .version'
          }

          assert_contains() {
            local file="$1"
            local needle="$2"
            local label="$3"
            [[ -f "${file}" ]] || fail "missing file: ${file}"
            grep -Fq "${needle}" "${file}" || fail "${label}: expected ${file} to contain '${needle}'"
          }

          assert_not_contains() {
            local file="$1"
            local needle="$2"
            local label="$3"
            [[ -f "${file}" ]] || fail "missing file: ${file}"
            if grep -Fq "${needle}" "${file}"; then
              fail "${label}: ${file} still contains stale '${needle}'"
            fi
          }

          parser_version="$(crate_version daml-parser)"
          syntax_version="$(crate_version daml-syntax)"
          lint_version="$(crate_version daml-lint)"
          fmt_version="$(crate_version daml-fmt)"

          crates_doc="docs/reference/crates.md"
          assert_contains "${crates_doc}" "| [\`daml-parser\`](https://github.com/stevennevins/daml-tools/tree/main/crates/daml-parser) | \`${parser_version}\` |" "crate versions"
          assert_contains "${crates_doc}" "| [\`daml-syntax\`](https://github.com/stevennevins/daml-tools/tree/main/crates/daml-syntax) | \`${syntax_version}\` |" "crate versions"
          assert_contains "${crates_doc}" "| [\`daml-lint\`](https://github.com/stevennevins/daml-tools/tree/main/crates/daml-lint) | \`${lint_version}\` |" "crate versions"
          assert_contains "${crates_doc}" "| [\`daml-fmt\`](https://github.com/stevennevins/daml-tools/tree/main/crates/daml-fmt) | \`${fmt_version}\` |" "crate versions"

          assert_contains "crates/daml-parser/README.md" "daml-parser = \"${parser_version}\"" "parser README dependency snippet"
          assert_contains "crates/daml-lint/README.md" "daml-lint = \"${lint_version}\"" "lint README dependency snippet"
          assert_contains "crates/daml-lint/README.md" "daml-lint = { version = \"${lint_version}\", default-features = false }" "lint README no-default-features snippet"
          assert_contains "crates/daml-lint/README.md" "current 0.9.x line" "lint README API stability line"
          assert_not_contains "crates/daml-lint/README.md" "current 0.8 line" "stale lint README API stability line"

          actual_fmt_package_version="$(jq -r '.version' crates/daml-fmt/package.json)"
          [[ "${actual_fmt_package_version}" == "${fmt_version}" ]] || \
            fail "daml-fmt package.json: expected ${fmt_version}, got ${actual_fmt_package_version}"

          echo "docs/version checks passed"
      - name: Build VitePress site
        run: |
          npm ci --prefix docs
          npm run build --prefix docs
      - name: Check LLM documentation artifacts
        shell: bash
        run: |
          set -euo pipefail

          assert_contains() {
            local file="$1"
            local needle="$2"
            [[ -f "${file}" ]] || { echo "missing file: ${file}" >&2; exit 1; }
            grep -Fq "${needle}" "${file}" || { echo "expected ${file} to contain ${needle}" >&2; exit 1; }
          }

          assert_contains docs/.vitepress/dist/llms.txt "# daml-tools"
          assert_contains docs/.vitepress/dist/llms.txt "/daml-tools/tutorials/first-run.md"
          assert_contains docs/.vitepress/dist/llms.txt "/daml-tools/how-to/format-daml.md"
          assert_contains docs/.vitepress/dist/llms.txt "/daml-tools/reference/cli.md"
          assert_contains docs/.vitepress/dist/llms.txt "/daml-tools/explanation/workspace-architecture.md"
          assert_contains docs/.vitepress/dist/llms-full.txt "# First run"
          assert_contains docs/.vitepress/dist/tutorials/first-run.md "# First run"
          assert_contains docs/.vitepress/dist/tutorials/build-a-parser-tool.md "# Build a tiny Daml mutation-testing tool"
          assert_contains docs/.vitepress/dist/tutorials/write-a-daml-lint-custom-rule.md "# Write a daml-lint custom rule"
          assert_contains docs/.vitepress/dist/how-to/format-daml.md "# Format Daml source"
          assert_contains docs/.vitepress/dist/how-to/scan-daml.md "# Scan Daml source"
          assert_contains docs/.vitepress/dist/reference/cli.md "# CLI reference"
          assert_contains docs/.vitepress/dist/reference/crates.md "# Crate and package reference"
          assert_contains docs/.vitepress/dist/reference/daml-lint-custom-rule-contract.md "# daml-lint custom rule contract"
          assert_contains docs/.vitepress/dist/explanation/workspace-architecture.md "# Workspace architecture"
          assert_contains docs/.vitepress/dist/explanation/formatter-verification.md "# Formatter verification"
          assert_contains docs/.vitepress/dist/explanation/daml-lint-rule-authoring.md "# daml-lint rule authoring model"
      - name: Check offline markdown links
        run: >-
          lychee
          --offline
          --no-progress
          --exclude-path
          docs/node_modules
          './README.md'
          './CONTRIBUTING.md'
          './docs/**/*.md'
          './developer-docs/**/*.md'
          './crates/daml-parser/README.md'
          './crates/daml-syntax/README.md'
          './crates/daml-lint/README.md'
          './crates/daml-fmt/README.md'
      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy docs to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
