name: Hermes review request

# Relays gated GitHub events to Hermes via signed webhook.
#
# pull_request_target is used (not pull_request) so HERMES_REVIEW_* secrets are
# available on fork PRs. This is safe here ONLY because:
#   - permissions: {} (no write tokens)
#   - no actions/checkout step (never runs untrusted PR head code)
#   - the job only reads GITHUB_EVENT_PATH metadata and POSTs a normalized payload
# See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#pull_request_target
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [review_requested]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions: {}

jobs:
  notify-hermes:
    if: >
      github.repository == 'stevennevins/daml-tools' && (
        (
          github.event_name == 'issue_comment' &&
          github.event.comment.user.login == 'stevennevins' &&
          (
            contains(github.event.comment.body, '@snevins-agent-2') ||
            github.event.issue.pull_request
          )
        ) || (
          github.event_name == 'pull_request_target' &&
          github.event.action == 'review_requested' &&
          github.event.requested_reviewer.login == 'snevins-agent-2' &&
          github.event.sender.login == 'stevennevins'
        ) || (
          github.event_name == 'pull_request_review' &&
          github.event.review.user.login == 'stevennevins' &&
          !(
            github.event.review.state == 'approved' &&
            github.event.review.body == '' &&
            github.event.pull_request.user.login == 'snevins-agent-2'
          ) &&
          (
            contains(github.event.review.body, '@snevins-agent-2') ||
            github.event.pull_request.user.login == 'snevins-agent-2'
          )
        ) || (
          github.event_name == 'pull_request_review_comment' &&
          github.event.comment.user.login == 'stevennevins' &&
          (
            contains(github.event.comment.body, '@snevins-agent-2') ||
            github.event.pull_request.user.login == 'snevins-agent-2'
          )
        )
      )
    runs-on: ubuntu-latest

    steps:
      - name: Send signed webhook to Hermes
        env:
          WEBHOOK_URL: ${{ secrets.HERMES_REVIEW_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.HERMES_REVIEW_WEBHOOK_SECRET }}
          EXPECTED_REPOSITORY: stevennevins/daml-tools
          EXPECTED_ACTOR: stevennevins
          EXPECTED_REVIEWER: snevins-agent-2
          BOT_MENTION: '@snevins-agent-2'
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          payload_file="$(mktemp)"
          sig_file="$(mktemp)"
          github_event_header_file="$(mktemp)"
          trap 'rm -f "$payload_file" "$sig_file" "$github_event_header_file"' EXIT

          python3 - "$payload_file" "$github_event_header_file" <<'PY'
          import json
          import os
          import sys
          import urllib.request

          source = json.load(open(os.environ['GITHUB_EVENT_PATH'], encoding='utf-8'))
          repo = source.get('repository', {}).get('full_name')
          expected_repo = os.environ['EXPECTED_REPOSITORY']
          expected_actor = os.environ['EXPECTED_ACTOR']
          expected_reviewer = os.environ['EXPECTED_REVIEWER']
          bot_mention = os.environ['BOT_MENTION']
          event_name = os.environ['GITHUB_EVENT_NAME']

          def skip(reason):
              print(f"::notice::skipped: {reason}")
              sys.exit(0)

          if repo != expected_repo:
              sys.exit(f"blocked: repo {repo!r} is not allowlisted")

          def minimal_repository():
              return {
                  'full_name': repo,
                  'html_url': source.get('repository', {}).get('html_url'),
              }

          def minimal_pull_request(pr):
              return {
                  'number': pr.get('number'),
                  'html_url': pr.get('html_url'),
                  'title': pr.get('title'),
                  'body': pr.get('body'),
                  'user': {
                      'login': (pr.get('user') or {}).get('login'),
                  },
                  'head': pr.get('head'),
                  'base': pr.get('base'),
              }

          def fetch_issue_pr_author(issue):
              pr_url = (issue.get('pull_request') or {}).get('url')
              if not pr_url:
                  return None
              req = urllib.request.Request(
                  pr_url,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'User-Agent': 'snevins-agent-2-hermes-relay',
                  },
              )
              with urllib.request.urlopen(req, timeout=10) as response:
                  pr = json.load(response)
              return ((pr.get('user') or {}).get('login'), pr)

          def is_agent_authored_or_mentioned(body, pr):
              body = body or ''
              if bot_mention in body:
                  return True, 'bot_mention'
              pr_author = ((pr or {}).get('user') or {}).get('login')
              if pr_author == expected_reviewer:
                  return True, 'agent_authored_pr_feedback'
              return False, 'not_mentioned_or_agent_authored'

          if event_name == 'issue_comment':
              actor = source.get('comment', {}).get('user', {}).get('login')
              body = source.get('comment', {}).get('body') or ''
              issue = source.get('issue') or {}
              if actor != expected_actor:
                  sys.exit(f"blocked: actor {actor!r} is not allowlisted")

              pr_author = None
              fetched_pr = None
              if bot_mention not in body:
                  pr_author, fetched_pr = fetch_issue_pr_author(issue)
                  if pr_author != expected_reviewer:
                      skip(
                          f"bot mention missing and PR author {pr_author!r} "
                          f"is not {expected_reviewer!r}"
                      )
              trigger_reason = (
                  'bot_mention' if bot_mention in body else 'agent_authored_pr_feedback'
              )

              payload = {
                  'event_name': event_name,
                  'action': source.get('action'),
                  'trigger_reason': trigger_reason,
                  'repository': minimal_repository(),
                  'issue': {
                      'number': issue.get('number'),
                      'html_url': issue.get('html_url'),
                      'pull_request': issue.get('pull_request'),
                  },
                  'comment': {
                      'id': source.get('comment', {}).get('id'),
                      'html_url': source.get('comment', {}).get('html_url'),
                      'body': body,
                      'user': {'login': actor},
                  },
                  'sender': {
                      'login': source.get('sender', {}).get('login'),
                  },
              }
              if fetched_pr is not None:
                  payload['pull_request'] = minimal_pull_request(fetched_pr)
              github_event_header = 'issue_comment'

          elif event_name == 'pull_request_target':
              action = source.get('action')
              sender = source.get('sender', {}).get('login')
              requested_reviewer = source.get('requested_reviewer') or {}
              requested_team = source.get('requested_team')
              reviewer_login = requested_reviewer.get('login')

              if action != 'review_requested':
                  sys.exit(f"blocked: action {action!r} is not review_requested")
              if sender != expected_actor:
                  sys.exit(f"blocked: sender {sender!r} is not allowlisted")
              if requested_team and not requested_reviewer:
                  sys.exit('blocked: team review request not supported')
              if reviewer_login != expected_reviewer:
                  sys.exit(f"blocked: requested_reviewer {reviewer_login!r} is not allowlisted")

              pr = source.get('pull_request') or {}
              issue = source.get('issue')
              payload = {
                  'event_name': event_name,
                  'action': action,
                  'trigger_reason': 'review_requested',
                  'repository': minimal_repository(),
                  'pull_request': minimal_pull_request(pr),
                  'requested_reviewer': requested_reviewer or None,
                  'requested_team': requested_team,
                  'sender': {
                      'login': sender,
                  },
              }
              if issue is not None:
                  payload['issue'] = issue
              github_event_header = 'pull_request'

          elif event_name == 'pull_request_review':
              action = source.get('action')
              review = source.get('review') or {}
              actor = (review.get('user') or {}).get('login')
              body = review.get('body') or ''
              state = review.get('state')
              pr = source.get('pull_request') or {}
              allowed, trigger_reason = is_agent_authored_or_mentioned(body, pr)

              if action != 'submitted':
                  sys.exit(f"blocked: action {action!r} is not submitted")
              if actor != expected_actor:
                  sys.exit(f"blocked: reviewer {actor!r} is not allowlisted")
              if not allowed:
                  skip('review is neither mentioned nor on an agent-authored PR')
              if trigger_reason == 'agent_authored_pr_feedback' and state == 'approved' and not body.strip():
                  skip('empty approval on agent-authored PR has no feedback to address')

              payload = {
                  'event_name': event_name,
                  'action': action,
                  'trigger_reason': trigger_reason,
                  'repository': minimal_repository(),
                  'pull_request': minimal_pull_request(pr),
                  'review': {
                      'id': review.get('id'),
                      'html_url': review.get('html_url'),
                      'body': body,
                      'state': state,
                      'user': {'login': actor},
                  },
                  'sender': {
                      'login': source.get('sender', {}).get('login'),
                  },
              }
              github_event_header = 'pull_request_review'

          elif event_name == 'pull_request_review_comment':
              action = source.get('action')
              comment = source.get('comment') or {}
              actor = (comment.get('user') or {}).get('login')
              body = comment.get('body') or ''
              pr = source.get('pull_request') or {}
              allowed, trigger_reason = is_agent_authored_or_mentioned(body, pr)

              if action != 'created':
                  sys.exit(f"blocked: action {action!r} is not created")
              if actor != expected_actor:
                  sys.exit(f"blocked: commenter {actor!r} is not allowlisted")
              if not allowed:
                  skip('review comment is neither mentioned nor on an agent-authored PR')

              payload = {
                  'event_name': event_name,
                  'action': action,
                  'trigger_reason': trigger_reason,
                  'repository': minimal_repository(),
                  'pull_request': minimal_pull_request(pr),
                  'comment': {
                      'id': comment.get('id'),
                      'html_url': comment.get('html_url'),
                      'body': body,
                      'path': comment.get('path'),
                      'line': comment.get('line'),
                      'side': comment.get('side'),
                      'start_line': comment.get('start_line'),
                      'start_side': comment.get('start_side'),
                      'user': {'login': actor},
                  },
                  'sender': {
                      'login': source.get('sender', {}).get('login'),
                  },
              }
              github_event_header = 'pull_request_review_comment'

          else:
              sys.exit(f"blocked: unsupported event {event_name!r}")

          with open(sys.argv[1], 'w', encoding='utf-8') as out:
              json.dump(payload, out, separators=(',', ':'), sort_keys=True)
              out.write('\n')
          with open(sys.argv[2], 'w', encoding='utf-8') as out:
              out.write(github_event_header)
          PY

          if [ ! -s "$payload_file" ]; then
            echo "No Hermes payload produced; event was intentionally skipped."
            exit 0
          fi

          openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex "$payload_file" \
            | awk '{print "sha256=" $2}' > "$sig_file"

          curl --fail --silent --show-error -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: $(cat "$github_event_header_file")" \
            -H "X-Hub-Signature-256: $(cat "$sig_file")" \
            -H "X-GitHub-Delivery: hermes-review-${{ github.run_id }}-${{ github.run_attempt }}" \
            --data-binary @"$payload_file"
