name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".smithers/**"
      - "AGENTS.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".smithers/**"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  MISE_LOCKED: "1"

jobs:
  # fmt + clippy + the whole test suite + the formatter's 924-file differential.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        run: mise install rust@1.96.0 node@22.23.1 npm@10.9.8
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        # Lint policy (the denies) lives in root Cargo.toml [workspace.lints], so
        # no `-- -D warnings` here. --all-features so the feature-gated dev-tool
        # bins are linted too.
        run: cargo clippy --workspace --all-targets --all-features --locked
      - name: rustdoc warnings
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps --locked
      - name: test
        run: cargo test --workspace --all-features --locked
      - name: daml-lint generated rules are current
        working-directory: crates/daml-lint
        run: npm ci && npm run check:rules
      - name: daml-lint feature split tests
        run: |
          cargo test -p daml-lint --no-default-features --lib --locked
          cargo test -p daml-lint --no-default-features --features js-runtime --lib --locked
          cargo test -p daml-lint --no-default-features --features custom-rules --lib --locked
          cargo test -p daml-lint --no-default-features --features cli,js-runtime --locked
          cargo test -p daml-lint --no-default-features --features cli,js-runtime,custom-rules --locked
      - name: daml-fmt differential (924 corpus files, no SDK)
        working-directory: crates/daml-fmt
        run: node test/diff.js

  # Build on the declared MSRV so a dependency bump that raises it fails loudly.
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MISE_RUST_VERSION: "1.87.0"
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        run: mise install rust@1.87.0
      - uses: Swatinem/rust-cache@v2
      - name: workspace all targets and features
        run: cargo check --workspace --all-targets --all-features --locked
      - name: daml-lint library without optional features
        run: cargo check -p daml-lint --no-default-features --locked
      - name: daml-lint JS runtime feature only
        run: cargo check -p daml-lint --no-default-features --features js-runtime --locked
      - name: daml-lint custom-rules feature only
        run: cargo check -p daml-lint --no-default-features --features custom-rules --locked
      - name: daml-lint CLI without custom rules
        run: cargo check -p daml-lint --no-default-features --features cli,js-runtime --locked
      - name: daml-lint CLI with custom rules
        run: cargo check -p daml-lint --no-default-features --features cli,js-runtime,custom-rules --locked

  # cargo-npm CLI packaging stays valid: generate the wrapper + host platform
  # package from [package.metadata.npm] and prove the binary runs. The full
  # cross-platform publish is exercised at release time by npm-publish.yml.
  npm-package:
    name: npm CLI packaging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        run: |
          mise install rust@1.96.0 node@22.23.1 npm@10.9.8
          mise install cargo:cargo-npm@0.1.2
      - uses: Swatinem/rust-cache@v2
      - name: Generate and validate npm packages
        shell: bash
        run: |
          set -euo pipefail
          target="$(rustc -vV | sed -n 's/^host: //p')"
          case "${target}" in
            x86_64-unknown-linux-gnu) npm_platform="linux-x64" ;;
            aarch64-unknown-linux-gnu) npm_platform="linux-arm64" ;;
            *) echo "unsupported npm package smoke target: ${target}" >&2; exit 1 ;;
          esac
          cargo build --release --locked --target "${target}" --bin daml-lint --bin daml-fmt
          for tool in daml-lint daml-fmt; do
            out="target/npm-ci/${tool}"
            cargo npm generate -p "${tool}" --infer-targets --out-dir "${out}" --clean
            node -e "const p=require('./'+process.argv[1]); if(!p.bin||!p.optionalDependencies||!Object.keys(p.optionalDependencies).length)throw new Error('wrapper missing bin/optionalDependencies')" "${out}/@daml-tools/${tool}/package.json"
            bin="${out}/@daml-tools/${tool}-${npm_platform}/${tool}"
            test -x "${bin}"
            "${bin}" --version
          done

  # Prove published crate tarballs compile against crates.io dependency versions.
  # Already-published crate versions must keep the same internal daml-* dependency
  # requirements; downstream tool crates verify once parser/syntax releases exist
  # on crates.io (see scripts/check-package.sh).
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        run: mise install rust@1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: package verification
        run: bash scripts/check-package.sh

  # License + advisory policy (see deny.toml).
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        run: |
          mise install rust@1.96.0
          mise install cargo:cargo-deny@0.19.9
      - name: cargo deny
        run: cargo deny check

  # Block public API compatibility regressions for every published library
  # target. A failed cargo-semver-checks run must fail the PR rather than
  # producing an unstable-but-mergeable status.
  semver:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package: [daml-parser, daml-syntax, daml-lint, daml-fmt]
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        run: |
          mise install rust@1.96.0
          mise install cargo:cargo-semver-checks@0.48.0
      - name: cargo semver checks
        run: cargo semver-checks --package ${{ matrix.package }}

  # Native CLI binaries per OS — the per-PR "it still builds a runnable CLI"
  # gate. Release assets are produced by release-artifacts.yml when a CLI tag is
  # published.
  build-pr:
    name: build (x86_64-unknown-linux-gnu)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        shell: bash
        run: |
          set -euo pipefail
          mise install rust@1.96.0
          rustup target add x86_64-unknown-linux-gnu
          if [[ "$(uname -m)" != "x86_64" ]]; then
            apt_get() {
              if [[ "$(id -u)" -eq 0 ]]; then
                apt-get "$@"
              else
                sudo apt-get "$@"
              fi
            }
            apt_get update
            apt_get install -y --no-install-recommends \
              gcc-x86-64-linux-gnu \
              libc6-dev-amd64-cross
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=x86_64-linux-gnu-gcc" >> "${GITHUB_ENV}"
          fi
      - uses: Swatinem/rust-cache@v2
      - name: build CLIs
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu --bin daml-lint --bin daml-fmt

  build-required-pr:
    name: build (${{ matrix.target }})
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-unknown-linux-gnu
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
    steps:
      - name: Full native build runs after merge
        run: |
          echo "PRs build the Linux x64 CLI smoke target only to control CI cost."
          echo "The full native ${{ matrix.target }} release build runs on main and release tags."

  build:
    name: build (${{ matrix.target }})
    if: ${{ github.event_name != 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4.2.0
        with:
          install: false
      - name: Install locked tools
        run: |
          mise install rust@1.96.0
          rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build CLIs
        run: cargo build --release --locked --target ${{ matrix.target }} --bin daml-lint --bin daml-fmt
