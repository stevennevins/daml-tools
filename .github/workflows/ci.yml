name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # fmt + clippy + the whole test suite + the formatter's 924-file differential.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        # Lint policy (the denies) lives in root Cargo.toml [workspace.lints], so
        # no `-- -D warnings` here. --all-features so the feature-gated dev-tool
        # bins are linted too.
        run: cargo clippy --workspace --all-targets --all-features --locked
      - name: test
        run: cargo test --workspace --all-features --locked
      - name: daml-fmt differential (924 corpus files, no SDK)
        working-directory: crates/daml-fmt
        run: node test/diff.js

  # Build on the declared MSRV so a dependency bump that raises it fails loudly.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.87.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --locked

  # License + advisory policy (see deny.toml).
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Guard daml-parser's public API: a breaking change without a major bump
  # fails here. It needs a crates.io baseline to diff against, so it is a SOFT
  # gate (continue-on-error) until daml-parser 0.1.0 is published — the
  # name-reservation step. Without that it would be red on the very first PR.
  # Once 0.1.0 is on crates.io, drop `continue-on-error` to make it a hard gate.
  semver:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: daml-parser

  # Native release binaries per OS — the per-PR "it still builds a runnable CLI"
  # gate. The full cross-target matrix (aarch64-linux, musl, x86_64-darwin) and
  # the npm wrappers are deferred (no release workflow is committed yet): wire
  # them with cargo-dist in a separate release workflow when you set up
  # publishing. release-plz.toml configures the crates.io side.
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build CLIs
        run: cargo build --release --locked --target ${{ matrix.target }} --bin daml-lint --bin daml-fmt
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/daml-lint
            target/${{ matrix.target }}/release/daml-fmt
            target/${{ matrix.target }}/release/daml-lint.exe
            target/${{ matrix.target }}/release/daml-fmt.exe
          if-no-files-found: ignore
