default_install_hook_types = ["pre-commit", "commit-msg", "pre-push"]

[[repos]]
repo = "local"
hooks = [
  { id = "cargo-fmt", name = "cargo fmt", entry = "cargo fmt --all --check", language = "system", pass_filenames = false, stages = ["pre-commit"] },
  { id = "cargo-clippy", name = "cargo clippy", entry = "cargo clippy --workspace --all-targets --all-features --locked", language = "system", pass_filenames = false, stages = ["pre-commit"] },
  { id = "cargo-doc", name = "cargo doc", entry = "bash -c 'RUSTDOCFLAGS=\"-D warnings\" cargo doc --workspace --all-features --no-deps --locked'", language = "system", pass_filenames = false, stages = ["pre-commit"] },
  { id = "cargo-test", name = "cargo test", entry = "cargo test --workspace --all-features --locked", language = "system", pass_filenames = false, stages = ["pre-push"] },
  { id = "daml-fmt-diff", name = "daml-fmt differential", entry = "bash -c 'cd crates/daml-fmt && node test/diff.js'", language = "system", pass_filenames = false, stages = ["pre-push"] },
  # Advisory, mirroring CI's `continue-on-error` semver job: report API breaks
  # for EVERY published crate without blocking the push (release-plz owns the
  # version bump). The old `for ...; done` masked all but the last package's
  # result because a loop's exit status is only its final iteration; collect
  # every failure instead, and `verbose = true` so prek shows the report even
  # though the hook passes. Flip to a blocking gate (exit non-zero on $failed)
  # if/when CI drops `continue-on-error`.
  { id = "cargo-semver-checks", name = "cargo semver-checks", entry = "bash -c 'command -v cargo-semver-checks >/dev/null || { echo cargo-semver-checks is required: cargo install cargo-semver-checks --locked; exit 1; }; failed=\"\"; for package in daml-parser daml-lint daml-fmt; do cargo semver-checks check-release --package $package || failed=\"$failed $package\"; done; [ -z \"$failed\" ] || echo \"NOTE: cargo-semver-checks reports API breaks in:$failed — advisory (matches CI continue-on-error); release-plz will choose the version bump.\"'", language = "system", pass_filenames = false, stages = ["pre-push"], verbose = true },
]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"], args = [
    "build",
    "chore",
    "ci",
    "docs",
    "feat",
    "fix",
    "perf",
    "refactor",
    "release",
    "revert",
    "style",
    "test",
  ] },
]
