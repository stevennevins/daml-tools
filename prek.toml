default_install_hook_types = ["pre-commit", "commit-msg"]

[[repos]]
repo = "local"
hooks = [
  { id = "cargo-fmt", name = "cargo fmt", entry = "cargo fmt --all --check", language = "system", pass_filenames = false, files = "\\.rs$", stages = ["pre-commit"] },
]

[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"], args = [
    "build",
    "chore",
    "ci",
    "docs",
    "feat",
    "fix",
    "perf",
    "refactor",
    "release",
    "revert",
    "style",
    "test",
  ] },
]
