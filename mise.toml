# Pinned toolchain for local signoff, act, and GitHub CI.
# Use MISE_LOCKED=1 in signoff workflows only; do not set locked=true here.

[tools]
rust = { version = "1.96.0", components = "rustfmt,clippy" }
node = "22.23.1"
npm = "10.9.8"
"github:EmbarkStudios/cargo-deny" = "0.19.9"
"github:obi1kenobi/cargo-semver-checks" = "0.48.0"
"cargo:cargo-npm" = "0.1.2"
actionlint = "1.7.12"
lychee = "0.24.2"
act = "0.2.89"
gh = "2.95.0"

[tasks."signoff:ci:test"]
description = "Local PR signoff for CI/test: run the test job through act and create signoff/test."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j test",
  "gh signoff test",
]

[tasks."signoff:ci:npm-package"]
description = "Local PR signoff for CI/npm-package: run the npm package smoke job through act and create signoff/npm-package."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j npm-package",
  "gh signoff npm-package",
]

[tasks."signoff:ci:package"]
description = "Local PR signoff for CI/package: run crate package verification through act with the worktree git mount and create signoff/package."
env = { MISE_LOCKED = "1" }
run = '''
git_common="$(git rev-parse --path-format=absolute --git-common-dir)"
act workflow_dispatch -W .github/workflows/ci.yml -j package \
  --container-options "--mount type=bind,source=${git_common},target=${git_common},readonly"
gh signoff package
'''

[tasks."signoff:ci:cargo-deny"]
description = "Local PR signoff for CI/cargo-deny: run cargo-deny policy checks through act and create signoff/cargo-deny."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j cargo-deny",
  "gh signoff cargo-deny",
]

[tasks."signoff:ci:semver"]
description = "Local PR signoff for CI/semver: run public API semver checks through act and create signoff/semver."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j semver",
  "gh signoff semver",
]

[tasks."signoff:ci:build-linux-x64"]
description = "Local PR signoff for CI/build-linux-x64: run the Linux x64 CLI build smoke through act and create signoff/build-linux-x64."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j build-linux-x64",
  "gh signoff build-linux-x64",
]

[tasks."signoff:docs"]
description = "Local PR signoff for Docs: run version and link checks through act and create signoff/docs."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/docs.yml -j docs",
  "gh signoff docs",
]

[tasks."signoff:act:ci:test"]
description = "Run the CI/test act job for local PR signoff without creating a status."
env = { MISE_LOCKED = "1" }
run = "act workflow_dispatch -W .github/workflows/ci.yml -j test --action-cache-path .act/signoff-all/test/action-cache --cache-server-path .act/signoff-all/test/cache-server --cache-server-port 34569 --artifact-server-path .act/signoff-all/test/artifacts --artifact-server-port 34567"

[tasks."signoff:act:ci:npm-package"]
description = "Run the CI/npm-package act job for local PR signoff without creating a status."
env = { MISE_LOCKED = "1" }
run = "act workflow_dispatch -W .github/workflows/ci.yml -j npm-package --action-cache-path .act/signoff-all/npm-package/action-cache --cache-server-path .act/signoff-all/npm-package/cache-server --cache-server-port 34570 --artifact-server-path .act/signoff-all/npm-package/artifacts --artifact-server-port 34568"

[tasks."signoff:act:ci:package"]
description = "Run the CI/package act job for local PR signoff without creating a status."
env = { MISE_LOCKED = "1" }
run = '''
git_common="$(git rev-parse --path-format=absolute --git-common-dir)"
act workflow_dispatch -W .github/workflows/ci.yml -j package \
  --action-cache-path .act/signoff-all/package/action-cache \
  --cache-server-path .act/signoff-all/package/cache-server \
  --cache-server-port 34571 \
  --artifact-server-path .act/signoff-all/package/artifacts \
  --artifact-server-port 34572 \
  --container-options "--mount type=bind,source=${git_common},target=${git_common},readonly"
'''

[tasks."signoff:act:ci:cargo-deny"]
description = "Run the CI/cargo-deny act job for local PR signoff without creating a status."
env = { MISE_LOCKED = "1" }
run = "act workflow_dispatch -W .github/workflows/ci.yml -j cargo-deny --action-cache-path .act/signoff-all/cargo-deny/action-cache --cache-server-path .act/signoff-all/cargo-deny/cache-server --cache-server-port 34573 --artifact-server-path .act/signoff-all/cargo-deny/artifacts --artifact-server-port 34574"

[tasks."signoff:act:ci:semver"]
description = "Run the CI/semver act matrix job for local PR signoff without creating a status."
env = { MISE_LOCKED = "1" }
run = "act workflow_dispatch -W .github/workflows/ci.yml -j semver --action-cache-path .act/signoff-all/semver/action-cache --cache-server-path .act/signoff-all/semver/cache-server --cache-server-port 34575 --artifact-server-path .act/signoff-all/semver/artifacts --artifact-server-port 34576"

[tasks."signoff:act:ci:build-linux-x64"]
description = "Run the CI/build-linux-x64 act job for local PR signoff without creating a status."
env = { MISE_LOCKED = "1" }
run = "act workflow_dispatch -W .github/workflows/ci.yml -j build-linux-x64 --action-cache-path .act/signoff-all/build-linux-x64/action-cache --cache-server-path .act/signoff-all/build-linux-x64/cache-server --cache-server-port 34577 --artifact-server-path .act/signoff-all/build-linux-x64/artifacts --artifact-server-port 34578"

[tasks."signoff:act:docs"]
description = "Run the Docs act job for local PR signoff without creating a status."
env = { MISE_LOCKED = "1" }
run = "act workflow_dispatch -W .github/workflows/docs.yml -j docs --action-cache-path .act/signoff-all/docs/action-cache --cache-server-path .act/signoff-all/docs/cache-server --cache-server-port 34579 --artifact-server-path .act/signoff-all/docs/artifacts --artifact-server-port 34580"

[tasks."signoff:status:all"]
description = "Create all local PR signoff statuses after every act signoff task has passed."
run = [
  "gh signoff test",
  "gh signoff npm-package",
  "gh signoff package",
  "gh signoff cargo-deny",
  "gh signoff semver",
  "gh signoff docs",
]

[tasks."signoff:all"]
description = "Run every required local PR signoff act task in parallel, then create signoff statuses."
env = { MISE_LOCKED = "1" }
run = [
  "mise run signoff:act:ci:test ::: signoff:act:ci:npm-package ::: signoff:act:ci:package ::: signoff:act:ci:cargo-deny ::: signoff:act:ci:semver ::: signoff:act:docs",
  "mise run signoff:status:all",
]
