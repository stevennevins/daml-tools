# Pinned toolchain for local signoff, act, and GitHub CI.
# Use MISE_LOCKED=1 in signoff workflows only; do not set locked=true here.

[tools]
rust = { version = "1.96.0", components = "rustfmt,clippy" }
node = "22.23.1"
npm = "10.9.8"
"cargo:cargo-deny" = "0.19.9"
"cargo:cargo-semver-checks" = "0.48.0"
"cargo:cargo-npm" = "0.1.2"
actionlint = "1.7.12"
lychee = "0.24.2"
act = "0.2.89"
gh = "2.95.0"

[tasks."signoff:ci:test"]
description = "Local PR signoff for CI/test: run the test job through act and create signoff/test."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j test",
  "gh signoff test",
]

[tasks."signoff:ci:npm-package"]
description = "Local PR signoff for CI/npm-package: run the npm package smoke job through act and create signoff/npm-package."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j npm-package",
  "gh signoff npm-package",
]

[tasks."signoff:ci:package"]
description = "Local PR signoff for CI/package: run crate package verification through act with the worktree git mount and create signoff/package."
env = { MISE_LOCKED = "1" }
run = '''
git_common="$(git rev-parse --path-format=absolute --git-common-dir)"
act workflow_dispatch -W .github/workflows/ci.yml -j package \
  --container-options "--mount type=bind,source=${git_common},target=${git_common},readonly"
gh signoff package
'''

[tasks."signoff:ci:cargo-deny"]
description = "Local PR signoff for CI/cargo-deny: run cargo-deny policy checks through act and create signoff/cargo-deny."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j cargo-deny",
  "gh signoff cargo-deny",
]

[tasks."signoff:ci:semver"]
description = "Local PR signoff for CI/semver: run public API semver checks through act and create signoff/semver."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j semver",
  "gh signoff semver",
]

[tasks."signoff:ci:build-linux-x64"]
description = "Local PR signoff for CI/build-linux-x64: run the Linux x64 CLI build smoke through act and create signoff/build-linux-x64."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/ci.yml -j build-linux-x64",
  "gh signoff build-linux-x64",
]

[tasks."signoff:docs"]
description = "Local PR signoff for Docs: run version and link checks through act and create signoff/docs."
env = { MISE_LOCKED = "1" }
run = [
  "act workflow_dispatch -W .github/workflows/docs.yml -j docs",
  "gh signoff docs",
]

[tasks."signoff:all"]
description = "Run every required local PR signoff task in sequence."
env = { MISE_LOCKED = "1" }
run = [
  "mise run signoff:ci:test",
  "mise run signoff:ci:npm-package",
  "mise run signoff:ci:package",
  "mise run signoff:ci:cargo-deny",
  "mise run signoff:ci:semver",
  "mise run signoff:ci:build-linux-x64",
  "mise run signoff:docs",
]
